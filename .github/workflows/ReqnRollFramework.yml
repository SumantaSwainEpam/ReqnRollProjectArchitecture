name: Reqnroll Test Project Sauce Demo App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '8.0' ]
        browser: [ chrome, firefox ] # Removed edge for now as it requires extra setup on Linux

    env:
      BROWSER: ${{ matrix.browser }}
      HEADLESS: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: 💾 Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: 🌐 Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: 🦊 Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: 'latest'

      - name: 📦 Restore dependencies
        run: dotnet restore

      - name: 🏗️ Build solution
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Run Reqnroll Tests on ${{ matrix.browser }}
        run: |
          echo "🌐 Running tests on browser: $BROWSER"
          dotnet test --no-build --configuration Release \
            --filter "FullyQualifiedName~ReqnRollProjectArchitecture.Features" \
            --logger "trx;LogFileName=test_results_${{ matrix.browser }}.trx" \
            --results-directory TestResults \
            --verbosity normal

      - name: 📤 Upload Reports & Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Results-${{ matrix.browser }}
          path: |
            TestResults/
            **/bin/Release/net8.0/TestResults/
            **/*.trx

      - name: Generate Test Summary
        if: always()
        run: |
          echo "### 🧪 Test Summary for Browser: ${{ matrix.browser }}" >> $GITHUB_STEP_SUMMARY
          TRX_FILE=$(find TestResults -name "test_results_${{ matrix.browser }}.trx" | head -1)
          if [ -f "$TRX_FILE" ]; then
            PASSED=$(grep -o 'outcome="Passed"' "$TRX_FILE" | wc -l)
            FAILED=$(grep -o 'outcome="Failed"' "$TRX_FILE" | wc -l)
            TOTAL=$(grep -c 'testCaseName' "$TRX_FILE" || echo "0")
            echo "- ✅ Passed: $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- ❌ Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- 🧩 Total: $TOTAL" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ No TRX file found." >> $GITHUB_STEP_SUMMARY
          fi

  combine-reports:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: 📥 Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 📊 Install ReportGenerator
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: 📈 Generate Combined Report
        run: |
          reportgenerator \
            "-reports:./artifacts/**/*.trx" \
            "-targetdir:./CombinedReport" \
            "-reporttypes:HtmlInline_AzurePipelines;TextSummary"

      - name: 📤 Upload Combined Report
        uses: actions/upload-artifact@v4
        with:
          name: Combined-Test-Report
          path: ./CombinedReport
